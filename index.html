<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Titanium One Car Care</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    body { margin:0; font-family:'Figtree',sans-serif; background:#000; color:#fff; }
    img { max-width:100%; display:block; }

    nav {
      position:fixed; top:0; width:100%;
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 40px;
      background:rgba(0,0,0,0.7);
    }

    .nav-links { display:flex; gap:20px; list-style:none; }
    .nav-links a { color:#aaa; text-decoration:none; }
    .nav-links a:hover { color:#fc5f2b; }

    .nav-cta {
      background:#fc5f2b; padding:10px 20px; border-radius:20px;
      color:#fff; text-decoration:none;
    }

    #hero {
      display:flex; min-height:100vh;
    }

    .hero-left {
      flex:1; padding:120px 60px;
    }

    .hero-right {
      flex:1; position:relative;
    }

    .hero-right img {
      width:100%; height:100%; object-fit:cover;
    }

    h1 { font-size:60px; line-height:1.1; }
    .accent { color:#fc5f2b; }

    .btn {
      display:inline-block;
      margin-top:20px;
      background:#fc5f2b;
      padding:12px 25px;
      border-radius:25px;
      color:#fff;
      text-decoration:none;
    }

    section { padding:80px 40px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
    }

    .card {
      background:#111;
      border-radius:10px;
      overflow:hidden;
    }

    .card img { height:200px; object-fit:cover; }

    footer {
      background:#000;
      padding:40px;
      text-align:center;
      color:#666;
    }
  </style>
</head>

<body>

<nav>
  <img src="brand-assets/logo.png" height="40"/>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#how">How It Works</a></li>
  </ul>
  <a href="#" class="nav-cta">Book Now</a>
</nav>

<section id="hero">
  <div class="hero-left">
    <h1>
      Get the finish<br>
      your car<br>
      <span class="accent">truly deserves.</span>
    </h1>
    <p>Premium detailing services with perfect results.</p>
    <a href="#" class="btn">Book a Detail</a>
  </div>

  <div class="hero-right">
    <img src="images/hero-car.png" alt="">
  </div>
</section>

<section id="services">
  <h2>Our Services</h2>

  <div class="grid">

    <div class="card">
      <img src="images/ferrari-garage.png">
      <div style="padding:15px;">Full Detail</div>
    </div>

    <div class="card">
      <img src="images/ceramic-apply.png">
      <div style="padding:15px;">Ceramic Coating</div>
    </div>

    <div class="card">
      <img src="images/detail-polishing.png">
      <div style="padding:15px;">Paint Correction</div>
    </div>

    <div class="card">
      <img src="images/interior-work.png">
      <div style="padding:15px;">Interior Detail</div>
    </div>

  </div>
</section>

<section id="how">
  <h2>How It Works</h2>
  <img src="images/detail-polishing.png" style="width:400px;">
</section>

<footer>
  © 2025 Titanium One Car Care
</footer>

</body>
</html>
